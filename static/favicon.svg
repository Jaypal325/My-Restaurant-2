<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark teal background -->
  <rect width="32" height="32" rx="7" fill="#0d3d52"/>
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="12" fill="#e9a820" opacity="0.18"/>
  <!-- Gold coin -->
  <circle cx="16" cy="16" r="10.5" fill="#f0b429"/>
  <!-- Inner coin sheen -->
  <circle cx="16" cy="16" r="9" fill="#f5c842"/>
  <!-- Coin edge -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#c68a10" stroke-width="0.8"/>
  <!-- Rupee ₹ symbol -->
  <text x="16" y="21.5"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="13.5"
    font-weight="900"
    fill="#7a4500"
    letter-spacing="-0.5">₹</text>
  <!-- Small shine highlight -->
  <ellipse cx="13" cy="12" rx="3" ry="1.5" fill="white" opacity="0.25" transform="rotate(-30 13 12)"/>
</svg>
